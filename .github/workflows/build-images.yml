name: Build Frappe Images

on:
  push:
    branches:
      - main
    paths:
      - apps/**
      - images/**
      - .github/workflows/build-images.yml
  workflow_dispatch:
    inputs:
      image:
        description: 'Image to build: frappe / erpnext / hrms / erpnext-hrms / all'
        required: true
        default: 'all'

env:
  REGISTRY: ghcr.io
  OWNER: rafsunx
  FRAPPE_BRANCH: version-16

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: frappe
            apps_file: apps/frappe.json
          - name: erpnext
            apps_file: apps/erpnext.json
          - name: hrms
            apps_file: apps/hrms.json
          - name: erpnext-hrms
            apps_file: apps/erpnext-hrms.json

    steps:
      - name: Skip check
        id: check
        run: |
          INPUT="${{ github.event.inputs.image }}"
          if [ -z "$INPUT" ] || [ "$INPUT" = "all" ] || [ "$INPUT" = "${{ matrix.name }}" ]; then
            echo "run=true" >> $GITHUB_OUTPUT
          else
            echo "run=false" >> $GITHUB_OUTPUT
          fi

      - name: Checkout
        if: steps.check.outputs.run == 'true'
        uses: actions/checkout@v4

      - name: Set up QEMU
        if: steps.check.outputs.run == 'true'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: steps.check.outputs.run == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: steps.check.outputs.run == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare apps.json
        if: steps.check.outputs.run == 'true'
        run: |
          cp ${{ matrix.apps_file }} /tmp/apps.json
          python3 -m json.tool /tmp/apps.json > /dev/null && echo "apps.json valid"

      - name: Build and push ${{ matrix.name }}
        if: steps.check.outputs.run == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: images/layered/Containerfile
          push: true
          no-cache: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            FRAPPE_PATH=https://github.com/frappe/frappe
            FRAPPE_BRANCH=${{ env.FRAPPE_BRANCH }}
          secret-files: |
            apps_json=/tmp/apps.json
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ matrix.name }}:latest
            ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ matrix.name }}:v16
